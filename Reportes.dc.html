@keyframes rb-spin{to{transform:rotate(360deg)}}
@keyframes rb-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.rb-scroll::-webkit-scrollbar{width:10px;height:10px}
.rb-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px;border:2px solid transparent;background-clip:padding-box}

:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px}
textarea,input,button,select{font-family:inherit}
.rb-mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace}
@media (prefers-reduced-motion:reduce){.rb-tr,.rb-tr *{transition:none!important}.rb-fade,.rb-pop,.rb-toast{animation:none!important}}

/* ═══════════════════════════════════════════════════════════════════════════
   PANEL DE LUCHITO — app de una sola página (React sobre el runtime support.js)
   ───────────────────────────────────────────────────────────────────────────
   Organización del archivo:
     1. CONSTANTES        proveedores IA, tipos/canales de reporte, paletas, agenda por defecto
     2. HELPERS           tokenizador SQL, formato de horas, colores
     3. class Component   toda la app:
          · estado + ciclo de vida + cliente API (/api/*)
          · autenticación (login/registro/logout)
          · MÓDULO 1  Constructor (banco de queries → bloques + chat IA → colector → notebook)
          · MÓDULO 2  Reportes por horario (agenda kanban + notificaciones)
          · MÓDULO 3  Solicitudes (historial de pedidos con capturas)
          · RENDER     shell con sidebar, topbar, modales, primitivos de UI e iconos
   El backend (FastAPI) vive en /backend y guarda todo por usuario.
   ═══════════════════════════════════════════════════════════════════════════ */

// ── 1. CONSTANTES ────────────────────────────────────────────────────────────
const PROVIDERS={
  anthropic:{label:'Anthropic',model:'claude-sonnet-5'},
  openai:{label:'OpenAI',model:'gpt-4o'},
  deepseek:{label:'DeepSeek',model:'deepseek-chat'}

const KWSET=new Set(('SELECT FROM WHERE AND OR NOT IN AS ON JOIN LEFT RIGHT INNER OUTER FULL CROSS GROUP BY ORDER HAVING LIMIT DISTINCT CASE WHEN THEN ELSE END NULL IS LIKE BETWEEN UNION ALL WITH INSERT INTO VALUES UPDATE SET DELETE CREATE OR REPLACE TEMP TEMPORARY VIEW TABLE DESC ASC OVER PARTITION USING EXISTS QUALIFY PIVOT LATERAL EXPLODE').split(' '));
const uid=()=>Math.random().toString(36).slice(2,9);
// Funciones que el admin puede habilitar a un viewer (deben coincidir con FEATURES del backend).
const FEATURES=[
  {key:'reportes',label:'Reportes por horario',icon:'clock'},
  {key:'solicitudes',label:'Solicitudes',icon:'inbox'},
  {key:'links',label:'Links',icon:'link'},
  {key:'ia',label:'Asistente IA',icon:'spark'}
];
const KPICOLORS=['var(--amber)','var(--green)','var(--blue)','var(--purple)','var(--red)'];
// --- módulo Reportes por horario ---
const REP_TIPOS=[{id:'corte',label:'Corte',short:'CORTE'},{id:'acumulado',label:'Acumulado',short:'ACUM'},{id:'cierre',label:'Cierre',short:'CIERRE'},{id:'adhoc',label:'Ad-hoc',short:'AD-HOC'}];

const PRIORIDADES=[{id:'alta',label:'Alta',color:'#dc2626'},{id:'media',label:'Media',color:'#d99a2b'},{id:'baja',label:'Baja',color:'#2f8b8a'}];
// Agenda por defecto que el usuario puede cargar de un clic (Ajustes / primera carga).
// g = gerencias (nombres exactos del catálogo). ch: whatsapp | email | both.

function gerColor(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return GER_PALETTE[h%GER_PALETTE.length];}
function pad2(n){return (n<10?'0':'')+n;}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function repParseTime(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return (h||0)*60+(m||0);}
function minToHHMM(min){min=((min%1440)+1440)%1440;return pad2(Math.floor(min/60))+':'+pad2(min%60);}

// ── 2. HELPERS ───────────────────────────────────────────────────────────────
// Tokeniza SQL para el resaltado de sintaxis (keywords, strings, {parámetros}…).
function tokenize(sql){
  const out=[];const re=/(--[^\n]*|\/\*[\s\S]*?\*\/)|('(?:[^']|'')*'|"(?:[^"]|"")*")|(\{[a-zA-Z0-9_]+\})|(\b\d+(?:\.\d+)?\b)|([A-Za-z_][A-Za-z0-9_]*)|(\s+)|([\s\S])/g;let m;
  while((m=re.exec(sql))){
    if(m[1])out.push(['com',m[0]]);
    else if(m[2])out.push(['str',m[0]]);
    else if(m[3])out.push(['param',m[0]]);
    else if(m[4])out.push(['num',m[0]]);
    else if(m[5]){const after=sql.slice(re.lastIndex).match(/^\s*\(/);if(KWSET.has(m[0].toUpperCase()))out.push(['kw',m[0]]);else if(after)out.push(['fn',m[0]]);else out.push(['id',m[0]]);}
    else if(m[6])out.push(['ws',m[0]]);
    else out.push(['punc',m[0]]);
    if(m.index===re.lastIndex)re.lastIndex++;
  }
  return out;
}
const TOKCOL={kw:'var(--kw)',str:'var(--str)',num:'var(--num)',fn:'var(--fn)',com:'var(--com)',param:'var(--param)',punc:'var(--punc)',id:'var(--text)',ws:'inherit'};

// ── 3. COMPONENTE PRINCIPAL ──────────────────────────────────────────────────
class Component extends DCLogic{
  // Estado global de la app (un solo objeto; los módulos comparten sesión y datos).
  state={
    booting:true, user:null, theme:'light', module:'constructor',
    authMode:'login', authEmail:'', authPass:'', authErr:'', authLoading:false,
    stage:'banco', tab:'editor', search:'', modal:null,
    queries:[], catalog:{}, templates:[], outputBlocks:[], reports:[],
    active:null, gen:{}, chats:{}, aiState:{loading:false,error:'',prompt:''},
    aiProvider:'anthropic', aiAvail:{}, sidebar:true,
    collector:[], drag:null, pieceDrag:null, catDrag:null, catInput:null, listDraft:{},
    vw:(typeof window!=='undefined'?window.innerWidth:1200), navOpen:false,
    nb:{templateId:null,name:'Reporte sin título',pieces:[],finalTable:'',outputs:[],viz:{type:'barras'}},
    // módulo 2 (reportes por horario)
    scheduledReports:[], repEdit:null, repSimMin:null, repFilter:'todos', repNotified:{},
    // módulo 3 (solicitudes)
    requests:[], reqEdit:null, reqSearch:'', reqFilterPri:'todas', reqFrom:'', reqTo:'', imgView:null,
    // módulo Links
    links:[], linkEdit:null,
    // administración de usuarios (solo admin)
    users:[],
    toasts:[]
  };

  // ---------- ciclo de vida ----------
  componentDidMount(){
    try{const t=localStorage.getItem('rb_theme');if(t)this.state.theme=t;}catch(e){}
    this._key=(e)=>{ if(e.key==='Escape'){ if(this.state.imgView)this.setState({imgView:null}); else if(this.state.modal)this.setState({modal:null}); else if(this.state.reqEdit)this.setState({reqEdit:null}); else if(this.state.repEdit)this.setState({repEdit:null}); } };
    window.addEventListener('keydown',this._key);
    // Pegar capturas (Ctrl+V) mientras el editor de Solicitudes está abierto
    this._paste=(e)=>{ if(!this.state.reqEdit)return; const items=(e.clipboardData&&e.clipboardData.items)||[]; const files=[]; for(const it of items){ if(it.type&&it.type.indexOf('image/')===0){ const f=it.getAsFile(); if(f)files.push(f); } } if(files.length){ e.preventDefault(); this.reqAddFiles(this.state.reqEdit,files); } };
    window.addEventListener('paste',this._paste);
    this._resize=()=>{clearTimeout(this._rz);this._rz=setTimeout(()=>this.setState({vw:window.innerWidth}),150);};
    window.addEventListener('resize',this._resize);
    if(window.innerWidth<900)this.state.sidebar=false;
    this.checkAuth();
  }
  componentWillUnmount(){window.removeEventListener('keydown',this._key);window.removeEventListener('paste',this._paste);window.removeEventListener('resize',this._resize);if(this._clock)clearInterval(this._clock);}
  isNarrow(){return this.state.vw<900;}
  isTiny(){return this.state.vw<560;}

  async checkAuth(){
    try{ const r=await fetch('/api/auth/me',{credentials:'same-origin'});
      if(r.ok){ const u=await r.json(); this.setState({user:u,booting:false}); this.loadAll(); }
      else this.setState({booting:false}); }
    catch(e){ this.setState({booting:false,authErr:'No se pudo contactar al servidor'}); }
  }

  // ---------- cliente API ----------
  async api(method,path,body){
    const opts={method,credentials:'same-origin',headers:{}};
    if(body!==undefined){opts.headers['content-type']='application/json';opts.body=JSON.stringify(body);}
    const r=await fetch('/api'+path,opts);
    let j=null; try{j=await r.json();}catch(e){}
    if(!r.ok) throw new Error((j&&(j.detail||j.message))||('HTTP '+r.status));
    return j;
  }

  isAdmin(){ return this.state.user && this.state.user.role==='admin'; }
  hasPerm(key){ const u=this.state.user; if(!u)return false; if(u.role==='admin')return true; return (u.permissions||[]).includes(key); }
  moduleAllowed(m){ if(m==='constructor')return true; if(m==='reportes')return this.hasPerm('reportes'); if(m==='pedidos')return this.hasPerm('solicitudes'); if(m==='links')return this.hasPerm('links'); return this.isAdmin(); }
  async loadAll(){
    const get=(path,def)=>this.api('GET',path).catch(e=>{console.warn('load',path,e.message);this._loadErr=(this._loadErr||0)+1;return def;});
    this._loadErr=0;
    // El banco (queries+catalog) lo ven todos; el resto según permisos.
    const [queries,catalog]=await Promise.all([get('/queries',[]),get('/catalog',{})]);
    let templates=[],outputBlocks=[],reports=[],scheduledReports=[],requests=[],links=[],avail={};
    const jobs=[];
    if(this.hasPerm('reportes'))jobs.push(get('/scheduled-reports',[]).then(x=>scheduledReports=x));
    if(this.hasPerm('solicitudes'))jobs.push(get('/requests',[]).then(x=>requests=x));
    if(this.hasPerm('links'))jobs.push(get('/links',[]).then(x=>links=x));
    if(this.hasPerm('ia'))jobs.push(fetch('/api/ai/providers',{credentials:'same-origin'}).then(r=>r.ok?r.json():{}).catch(()=>({})).then(x=>avail=x));
    if(this.isAdmin()){
      jobs.push(get('/templates',[]).then(x=>templates=x));
      jobs.push(get('/output-blocks',[]).then(x=>outputBlocks=x));
      jobs.push(get('/reports',[]).then(x=>reports=x));
    }
    await Promise.all(jobs);
    let collector=[];try{collector=JSON.parse(localStorage.getItem('rb_collector_'+this.state.user.id)||'[]');}catch(e){}
    const firstProv=Object.keys(avail).find(p=>avail[p])||'anthropic';
    const active=queries[0]?queries[0].id:null;
    const module=this.moduleAllowed(this.state.module)?this.state.module:'constructor';
    this.setState({queries,catalog,templates,outputBlocks,reports,scheduledReports,requests,links,aiAvail:avail,aiProvider:firstProv,collector,active,module});
    this.startClock();
    if(this._loadErr) this.toast('Servidor desactualizado: reinicia uvicorn para cargar los módulos nuevos','err');
  }
  startClock(){ if(this._clock)return; this._clock=setInterval(()=>{ this.forceUpdate(); this.checkReportAlerts(); },30000); }

  // ---------- auth acciones ----------
  async submitAuth(){
    const {authMode,authEmail,authPass}=this.state;
    if(!authEmail||!authPass){this.setState({authErr:'Completa correo y contraseña'});return;}
    this.setState({authLoading:true,authErr:''});
    try{
      const u=await this.api('POST','/auth/'+(authMode==='login'?'login':'register'),{email:authEmail,password:authPass});
      this.setState({user:u,authPass:'',authLoading:false}); this.loadAll();
    }catch(e){ this.setState({authErr:e.message,authLoading:false}); }
  }
  async logout(){ try{await this.api('POST','/auth/logout');}catch(e){} this.setState({user:null,queries:[],active:null,collector:[]}); }

  // ---------- administración de usuarios ----------
  async loadUsers(){ try{const users=await this.api('GET','/admin/users');this.setState({users});}catch(e){this.toast(e.message,'err');} }
  async setUserRole(id,role){ try{const u=await this.api('PUT','/admin/users/'+id+'/role',{role});this.setState(s=>({users:s.users.map(x=>x.id===id?u:x)}));this.toast('Rol actualizado a '+role);}catch(e){this.toast(e.message,'err');} }
  async setUserPerms(id,perms){ try{const u=await this.api('PUT','/admin/users/'+id+'/permissions',{permissions:perms});this.setState(s=>({users:s.users.map(x=>x.id===id?u:x)}));}catch(e){this.toast(e.message,'err');} }
  toggleUserPerm(u,key){ const cur=u.permissions||[];const perms=cur.includes(key)?cur.filter(k=>k!==key):[...cur,key];this.setUserPerms(u.id,perms); }
  async removeUser(id){ try{await this.api('DELETE','/admin/users/'+id);this.setState(s=>({users:s.users.filter(x=>x.id!==id)}));this.toast('Usuario eliminado');}catch(e){this.toast(e.message,'err');} }
  openUsers(){ this.setState({modal:'users'}); this.loadUsers(); }

  // ---------- utilidades ----------
  toast(msg,kind){const id=uid();this.setState(s=>({toasts:[...s.toasts,{id,msg,kind:kind||'ok'}]}));setTimeout(()=>this.setState(s=>({toasts:s.toasts.filter(t=>t.id!==id)})),2800);}
  copy(text){navigator.clipboard&&navigator.clipboard.writeText(text).then(()=>this.toast('Copiado')).catch(()=>this.toast('No se pudo copiar','err'));}
  download(name,content,mime){const b=new Blob([content],{type:mime||'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
  toggleTheme(){this.setState(s=>{const theme=s.theme==='dark'?'light':'dark';try{localStorage.setItem('rb_theme',theme);}catch(e){}return{theme};});}

  activeQuery(){return this.state.queries.find(q=>q.id===this.state.active);}
  detectParams(sql){return this.paramSpecs(sql).map(s=>s.name);}
  // Analiza la plantilla y devuelve [{name,kind}] con kind: single | list | listnum.
  paramSpecs(sql){ sql=sql||'';const kinds={};const order=[];
    const re=/\{(\w+)\[#\]\}|\{(\w+)\[\]\}|\{#(\w+)\}|\{\?(\w+)\}|\{(\w+)\}/g;let m;
    while((m=re.exec(sql))){ let name,kind;
      if(m[1]){name=m[1];kind='listnum';} else if(m[2]){name=m[2];kind='list';}
      else if(m[3]){name=m[3];kind='list';} else if(m[4]){name=m[4];kind='single';}
      else {name=m[5];kind='single';}
      if(!(name in kinds)){kinds[name]=kind;order.push(name);}
      else if(kind!=='single'&&kinds[name]==='single'){kinds[name]=kind;} }
    return order.map(n=>({name:n,kind:kinds[n]})); }
  // Expande la plantilla con los valores: repite bloques, opcionales, listas y valores.
  expandSql(sql,vals){ const q=(x)=>"'"+String(x).replace(/'/g,"''")+"'";
    const arr=(name)=>{let v=vals[name];if(Array.isArray(v))return v.map(x=>String(x).trim()).filter(Boolean);if(v==null||v==='')return [];return String(v).split(/[\n,]/).map(s=>s.trim()).filter(Boolean);};
    const has=(name)=>{const v=vals[name];if(Array.isArray(v))return v.some(x=>String(x).trim()!=='');return v!=null&&String(v).trim()!=='';};
    let out=sql||'';
    out=out.replace(/\{#(\w+)\}([\s\S]*?)\{\/\1\}/g,(mm,name,body)=>{const a=arr(name);if(!a.length)return '';return a.map((v,i)=>body.replace(/\{\.\}/g,v).replace(/\{@i\}/g,String(i+1))).join('');});
    out=out.replace(/\{\?(\w+)\}([\s\S]*?)\{\/\1\}/g,(mm,name,body)=>has(name)?body:'');
    out=out.replace(/\{(\w+)\[\]\}/g,(mm,name)=>{const a=arr(name);return a.length?a.map(q).join(','):mm;});
    out=out.replace(/\{(\w+)\[#\]\}/g,(mm,name)=>{const a=arr(name);return a.length?a.join(','):mm;});
    out=out.replace(/\{(\w+)\}/g,(mm,name)=>{const v=vals[name];return (v!=null&&v!=='')?(Array.isArray(v)?v.map(q).join(','):v):mm;});
    return out; }
  catalogFor(name){const n=name.toLowerCase();const c=this.state.catalog;const pick=(k)=>c[k]&&c[k].length?c[k]:null;
    if(/geren/.test(n))return pick('gerencias');if(/brand|pack/.test(n))return pick('brandpacks');if(/combo/.test(n))return pick('combos');
    if(/material/.test(n))return pick('materiales');if(/zona/.test(n))return pick('zonas');if(/promo/.test(n))return pick('promos');return null;}
  categories(){const set=[];(this.state.catalog.categorias||[]).forEach(c=>{if(!set.includes(c))set.push(c);});this.state.queries.forEach(q=>{if(q.category&&!set.includes(q.category))set.push(q.category);});if(!set.length)set.push('GENERAL');return set;}

  // ---------- IA ----------
  async ai(messages,system,maxTokens){
    const r=await fetch('/api/ai',{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json'},body:JSON.stringify({provider:this.state.aiProvider,system,messages,max_tokens:maxTokens||1600})});
    let j=null;try{j=await r.json();}catch(e){}
    if(!r.ok)throw new Error((j&&j.detail)||('HTTP '+r.status));
    return j.text;
  }
  stripFence(t){const m=t.match(/```(?:sql|python)?\s*([\s\S]*?)```/i);return (m?m[1]:t).trim();}
  aiHasKey(){return !!this.state.aiAvail[this.state.aiProvider];}

  async runAI(preset){
    const q=this.activeQuery();const prompt=(preset||this.state.aiState.prompt).trim();
    if(!this.aiHasKey()){this.setState({modal:'ai'});this.toast('Configura una API key en el servidor','err');return;}
    if(!prompt){this.toast('Escribe una instrucción','err');return;}
    const qid=q?q.id:'_';const msgs=[...(this.state.chats[qid]||[]),{role:'user',content:prompt}];
    this.setState(s=>({chats:Object.assign({},s.chats,{[qid]:msgs}),aiState:Object.assign({},s.aiState,{prompt:'',loading:true,error:''})}));
    const cat=this.state.catalog;
    const catLine=(k)=>((cat[k]||[]).length?k+': '+cat[k].join(', ')+'\n':'');
    const SIMB='SIMBOLOGÍA DE PLANTILLA (úsala al generar):\n'
      +'- {var}        valor único.\n'
      +'- {var[]}      lista con comillas → \'a\',\'b\',\'c\' (ideal para IN (...)).\n'
      +'- {var[#]}     lista numérica → 1,2,3.\n'
      +'- {#var}...{/var}   repite el bloque por cada valor de la lista var; dentro {.} es el valor y {@i} el índice (ideal para CASE WHEN).\n'
      +'- {?var}...{/var}   bloque opcional: solo aparece si var tiene valor.\n';
    const ctx=q&&q.context&&q.context.trim()?('\nCONTEXTO DE ESTA QUERY (dado por el usuario):\n'+q.context.trim()+'\n'):'';
    const sys='Eres un experto en SQL para Databricks (Spark SQL) y reportería comercial. Responde en español, claro. Cuando generes SQL enciérralo en un bloque ```sql.\n\n'+SIMB+'\nCATÁLOGO:\n'+['tablas','columnas','gerencias','brandpacks','combos','materiales','zonas','promos'].map(catLine).join('')+ctx+'\nQUERY ACTUAL:\n'+(q?q.sql:'(ninguna)');
    try{ const text=await this.ai(msgs.map(m=>({role:m.role,content:m.content})),sys);
      this.setState(s=>({chats:Object.assign({},s.chats,{[qid]:[...(s.chats[qid]||msgs),{role:'assistant',content:text}]}),aiState:Object.assign({},s.aiState,{loading:false})}));
    }catch(e){ this.setState(s=>({aiState:Object.assign({},s.aiState,{loading:false,error:e.message})}));this.toast('Error IA','err'); }
  }
  clearChat(){const q=this.activeQuery();const qid=q?q.id:'_';this.setState(s=>({chats:Object.assign({},s.chats,{[qid]:[]}),aiState:Object.assign({},s.aiState,{error:''})}));}

  async crossPieces(){
    const nb=this.state.nb;const qp=nb.pieces.filter(p=>p.kind==='query');
    if(qp.length<2){this.toast('Necesitas al menos 2 queries en el lienzo','err');return;}
    if(!this.aiHasKey()){this.setState({modal:'ai'});this.toast('Configura una API key','err');return;}
    this.setState(s=>({aiState:Object.assign({},s.aiState,{loading:true,error:''})}));
    const txt=qp.map((p,i)=>`QUERY ${i+1} — ${p.name}:\n${p.sql}`).join('\n\n');
    const cols=(this.state.catalog.columnas||[]).join(', ');
    const sys=`Eres experto en Databricks (Spark SQL). Combina varias queries en UNA tabla final: una fila por dimensión común (gerencia/zona) y una columna por métrica. Usa CTEs (WITH) por query y LEFT JOIN sobre la dimensión. Devuelve SOLO el SQL. Conserva {parametros}. Columnas: ${cols}.`;
    try{ const text=await this.ai([{role:'user',content:'Combina estas queries en una tabla final:\n\n'+txt}],sys);
      this.setNb({finalTable:this.stripFence(text)});this.setState(s=>({aiState:Object.assign({},s.aiState,{loading:false})}));this.toast('Tabla final generada por IA');
    }catch(e){ this.setState(s=>({aiState:Object.assign({},s.aiState,{loading:false,error:e.message})}));this.toast('Error al combinar','err'); }
  }

  nbScript(){ const nb=this.state.nb;const parts=[];
    nb.pieces.filter(p=>p.kind==='query').forEach((p,i)=>parts.push(`-- ===== Query ${i+1}: ${p.name} =====\n${p.sql}`));
