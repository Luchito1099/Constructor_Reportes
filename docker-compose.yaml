# Coolify:  Build Pack = Docker Compose  ·  Compose Location = /docker-compose.yaml
# Local:    docker compose up -d --build
#
# Los secretos se ponen en las Environment Variables de Coolify (o en un .env
# para local). En Coolify, asigna un dominio al servicio "web" y su proxy lo
# enruta al puerto 8000 del contenedor.
services:
  web:
    build: .
    environment:
      - RB_SESSION_SECRET=${RB_SESSION_SECRET:-cambia-esto-por-algo-largo}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - RB_ALLOW_REGISTER=${RB_ALLOW_REGISTER:-1}
      - RB_COOKIE_SECURE=${RB_COOKIE_SECURE:-1}
    # expose = puerto interno; Coolify enruta tu dominio aquí (con HTTPS).
    # NO uses "ports:" en Coolify — su proxy ya publica el 80/443 y chocaría.
    expose:
      - "8000"
    volumes:
      - rbdata:/data        # persiste la base SQLite y las capturas
    restart: unless-stopped

volumes:
  rbdata:
