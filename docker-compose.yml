# Despliegue de un comando:  docker compose up -d --build
# Configura los secretos en un archivo .env junto a este (ver .env.example).
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RB_SESSION_SECRET=${RB_SESSION_SECRET:-cambia-esto-por-algo-largo}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - RB_ALLOW_REGISTER=${RB_ALLOW_REGISTER:-1}
      - RB_COOKIE_SECURE=${RB_COOKIE_SECURE:-0}
    volumes:
      - rbdata:/data        # persiste la base SQLite y las capturas
    restart: unless-stopped

volumes:
  rbdata:
